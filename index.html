<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Berita Terkini</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="container">
            <h1>Info<span>Nasional</span></h1>
            <nav>
                <button id="loginBtn">Login Admin</button>
                <button id="logoutBtn" class="hidden">Logout</button>
            </nav>
        </div>
    </header>

    <main class="container">
        <section id="adminSection" class="hidden">
            <h2>Panel Admin: Tambah Berita</h2>
            <form id="newsForm">
                <input type="hidden" id="newsId">
                <input type="text" id="newsTitle" placeholder="Judul Berita" required>
                <textarea id="newsContent" rows="5" placeholder="Isi Berita..." required></textarea>
                <button type="submit" id="submitNewsBtn">Publikasikan</button>
            </form>
        </section>

        <section id="newsContainer">
            <h2>Berita Terbaru</h2>
            <div id="newsList">
                <p>Memuat berita...</p>
            </div>
        </section>
    </main>

    <div id="loginModal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h3>Login Admin</h3>
            <form id="loginForm">
                <input type="password" id="loginPassword" placeholder="Masukkan Password Admin" required>
                <button type="submit">Masuk</button>
            </form>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
